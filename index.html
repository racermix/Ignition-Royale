<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #060a18; color: white; font-family: 'Oswald', sans-serif; overflow: hidden; }
        
        /* Background: The Real Garage */
        #garage-viewport {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            /* REPLACE THIS URL WITH YOUR GARAGE PHOTO */
            background: url('your-garage-background.jpg') no-repeat center center;
            background-size: cover;
            touch-action: none; /* Important for preventing page scroll on swipe */
        }

        /* The Car Display Image (used for rotation) */
        #car-image {
            position: absolute; top: 50%; left: 50%;
            width: 80vmin; /* Responsive size */
            transform: translate(-50%, -50%) scaleY(1);
            /* This is where we swap the image source */
            content: url('car-assets/car_001.png');
            pointer-events: none; /* Allow clicks to pass through to UI */
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.7));
            transition: transform 0.3s ease-out; /* Smooth transition for top view */
        }

        /* UI Overlay (same as before) */
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .top-bar { pointer-events: auto; position: absolute; top: 10px; width: 95%; display: flex; justify-content: space-between; font-size: 20px; text-shadow: 0 0 10px black; }
        .stat-box { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 5px; border: 1px solid #d4af37; }
        
        .bottom-nav { pointer-events: auto; position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        button { padding: 15px 30px; background: #1a1f2e; color: #d4af37; border: 2px solid #d4af37; font-family: 'Oswald', sans-serif; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #d4af37; color: #060a18; }
        .play-btn { padding: 20px 60px; background: #32cd32; color: white; border: none; font-size: 24px; font-weight: bold; }
        
        /* Top-Down View State Class */
        #garage-viewport.top-view #car-image {
            content: url('car-assets/car_top.png');
            transform: translate(-50%, -50%) scale(1.2); /* Slightly larger overhead view */
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- The Interactive Viewport -->
    <div id="garage-viewport">
        <img id="car-image" alt="Car">
    </div>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <div class="top-bar">
            <div class="stat-box">Stars: 05.8K</div>
            <div>IGNITION ROYALE</div>
            <div class="stat-box">Coins: 10.5K</div>
        </div>
        <div class="bottom-nav">
            <button>RATE US</button>
            <button>RESUME</button>
            <button class="play-btn">PLAY >></button>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('garage-viewport');
        const carImage = document.getElementById('car-image');
        
        // 360 Rotation State
        let totalFrames = 36; // Number of images in your horizontal sequence
        let currentFrame = 1;
        let isDragging = false;
        let startX = 0;

        // 1. Horizontal Swipe Logic (Orbit)
        viewport.addEventListener('mousedown', e => { startOrbit(e.clientX); });
        viewport.addEventListener('touchstart', e => { startOrbit(e.touches[0].clientX); });
        
        window.addEventListener('mousemove', e => { if (isDragging) onOrbit(e.clientX); });
        window.addEventListener('touchmove', e => { if (isDragging) onOrbit(e.touches[0].clientX); });
        
        window.addEventListener('mouseup', endOrbit);
        window.addEventListener('touchend', endOrbit);

        function startOrbit(x) {
            isDragging = true;
            startX = x;
            viewport.style.cursor = 'grabbing';
        }

        function onOrbit(x) {
            if (!viewport.classList.contains('top-view')) { // Only rotate if not in top view
                let dx = x - startX;
                // Adjust sensitivity (currently 50 pixels of movement = 1 frame change)
                if (Math.abs(dx) > 20) { 
                    let frameDelta = Math.sign(dx); 
                    currentFrame = (currentFrame - frameDelta + totalFrames) % totalFrames;
                    if (currentFrame === 0) currentFrame = totalFrames;
                    
                    // Update image source dynamically
                    carImage.content = `car-assets/car_${String(currentFrame).padStart(3, '0')}.png`;
                    startX = x; // Reset startX for smooth dragging
                }
            }
        }

        function endOrbit() {
            isDragging = false;
            viewport.style.cursor = 'grab';
        }

        // 2. Vertical Swipe Logic (Top View)
        let startY = 0;
        let isSwipingDown = false;

        viewport.addEventListener('touchstart', e => { startY = e.touches[0].clientY; isSwipingDown = false; });
        viewport.addEventListener('touchmove', e => {
            let dy = e.touches[0].clientY - startY;
            // Detect if swiping down significantly
            if (dy > 100 && !isSwipingDown) {
                toggleTopView(true);
                isSwipingDown = true; // Prevent flickering
            } 
            // Detect if swiping up to exit top view
            else if (dy < -100 && isSwipingDown) {
                toggleTopView(false);
                isSwipingDown = false;
            }
        });

        function toggleTopView(enable) {
            if (enable) {
                viewport.classList.add('top-view');
            } else {
                viewport.classList.remove('top-view');
                // Ensure we reset the horizontal angle (optional, or keep the angle you left)
                carImage.content = `car-assets/car_${String(currentFrame).padStart(3, '0')}.png`;
            }
        }
        
        // Initialize cursor style
        viewport.style.cursor = 'grab';
    </script>
</body>
</html>
