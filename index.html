<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignition Royale</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #060a18;
            font-family: sans-serif;
        }

        #garage-viewport {
            width: 100vw;
            height: 100vh;
            background: url('garage.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        #garage-viewport::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 0;
        }

        /* ── CAR STAGE ─────────────────────────────────────────── */
        .car-stage {
            position: absolute;
            top: 46%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            width: min(680px, 92vw);
            height: min(420px, 50vh);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* ── GROUND LIGHT ───────────────────────────────────────── */
        /* Replaces the podium: a soft blue light pool on the garage floor,
           like a showroom spotlight, that the car sits flat on top of. */
        .ground-light {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 78%;
            height: 60px;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(64, 156, 255, 0.55) 0%, rgba(64, 156, 255, 0.25) 40%, transparent 75%);
            filter: blur(6px);
        }

        /* a tighter, brighter core right under the car */
        .ground-light::after {
            content: '';
            position: absolute;
            inset: 14px 20% 6px 20%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(140, 200, 255, 0.65) 0%, transparent 70%);
            filter: blur(3px);
        }

        /* ── STATIC CAR IMAGE ──────────────────────────────────── */
        /* Replaces the old Sketchfab iframe entirely. Sits flat on the
           garage floor, angled ¾ front/side, grounded in the blue light
           pool rather than raised on a podium. No rotation, no viewer
           chrome — just a grounded shot. */
        .car-image-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .car-image-wrap img {
            width: 68%;
            max-width: 400px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.6));
        }

        /* ── CAR INFO TAG ───────────────────────────────────────── */
        .car-info-tag {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            backdrop-filter: blur(4px);
            line-height: 1.5;
        }
        .car-info-tag strong { color: #d4af37; display: block; font-size: 14px; }

        /* ── BOTTOM BUTTONS ─────────────────────────────────────── */
        .ui-container {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 16px;
        }

        .ui-container button {
            padding: 16px 36px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }
        .ui-container button:active { transform: scale(0.96); }

        .rev-btn {
            background: rgba(0, 0, 0, 0.7);
            color: #d4af37;
            border: 2px solid #d4af37;
        }
        .rev-btn:hover { background: rgba(212, 175, 55, 0.15); }

        .play-btn {
            background: #32cd32;
            color: #0a1f0a;
            border: none;
            box-shadow: 0 4px 20px rgba(50, 205, 50, 0.4);
        }
        .play-btn:hover { opacity: 0.88; }

        /* ── REV ANIMATION ─────────────────────────────────────── */
        @keyframes revShake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            20%       { transform: translate(calc(-50% - 3px), -50%) rotate(-0.5deg); }
            40%       { transform: translate(calc(-50% + 3px), -50%) rotate(0.5deg); }
            60%       { transform: translate(calc(-50% - 2px), -50%) rotate(-0.3deg); }
            80%       { transform: translate(calc(-50% + 2px), -50%) rotate(0.3deg); }
        }
        .car-stage.revving { animation: revShake 0.18s linear 5; }
    </style>
</head>
<body>

<div id="garage-viewport">

    <div class="car-info-tag">
        <strong>Mercedes-AMG GT R</strong>
        Ignition Royale
    </div>

    <div class="car-stage" id="carStage">

        <div class="ground-light"></div>

        <div class="car-image-wrap">
            <img src="white car 1.png" alt="Mercedes-AMG GT R">
        </div>

    </div>

    <div class="ui-container">
        <button class="rev-btn" onclick="revEngine()">REV ENGINE</button>
        <button class="play-btn" onclick="startRace()">PLAY &gt;&gt;</button>
    </div>

</div>

<script>
    function revEngine() {
        const stage = document.getElementById('carStage');
        stage.classList.remove('revving');
        void stage.offsetWidth;
        stage.classList.add('revving');
        stage.addEventListener('animationend', () => stage.classList.remove('revving'), { once: true });
    }

    function startRace() {
        alert('Starting Race!');
    }
</script>

</body>
</html>
