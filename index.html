<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #060a18; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* The Garage Environment */
        #garage-viewport { 
            width: 100vw; height: 100vh; 
            /* Replace 'garage.jpg' with your garage photo file name */
            background: radial-gradient(circle, #1a2a6c 0%, #060a18 70%); 
            display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }

        /* The Car Styling */
        #car-display { 
            width: 600px; /* Adjust based on your image size */
            height: auto;
            pointer-events: none;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
            transition: transform 0.1s ease-out;
        }

        /* HUD UI Elements */
        .top-bar { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; font-weight: bold; }
        .side-bar { position: absolute; left: 20px; top: 30%; display: flex; flex-direction: column; gap: 10px; }
        .bottom-nav { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        
        button { padding: 15px 25px; background: rgba(0,0,0,0.5); color: white; border: 1px solid #d4af37; cursor: pointer; }
        .play-btn { background: #32cd32; border: none; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="garage-viewport">
        <!-- Load your transparent car image here -->
        <img id="car-display" src="starter_car.png" alt="Starter Car">
    </div>

    <!-- UI Overlay -->
    <div class="top-bar">
        <div>Stars: 05.8K</div>
        <div>Coins: 10.5K</div>
    </div>

    <div class="side-bar">
        <button>SPIN WHEEL</button>
        <button>DAILY REWARD</button>
    </div>

    <div class="bottom-nav">
        <button>RATE US</button>
        <button>RESUME</button>
        <button class="play-btn" onclick="alert('Starting Race!')">PLAY >></button>
    </div>

    <script>
        const viewport = document.getElementById('garage-viewport');
        const car = document.getElementById('car-display');
        let isDragging = false;
        let rotation = 0;

        // Interaction Logic
        viewport.addEventListener('mousedown', () => isDragging = true);
        viewport.addEventListener('touchstart', () => isDragging = true);
        
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                rotation += e.movementX * 0.5;
                car.style.transform = `rotateY(${rotation}deg)`;
            }
        });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
    </script>
</body>
</html>
