<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignition Royale</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #060a18; }
        
        #garage-viewport { 
            width: 100vw; height: 100vh; 
            background: url('garage.jpg') no-repeat center center; 
            background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* This container holds both the podium and the car */
        .stage {
            position: relative;
            width: 800px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Podium: Fixed at the base of the stage */
        .podium {
            position: absolute;
            bottom: 20px;
            width: 500px;
            height: 80px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 1;
        }

        /* The Iframe: Smaller so it doesn't hide the whole screen */
        .sketchfab-wrapper { 
            position: relative;
            width: 100%; 
            height: 100%; 
            z-index: 2; 
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        .ui-container { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 10; }
        button { padding: 15px 30px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #d4af37; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .play-btn { background: #32cd32; border: none; }
    </style>
</head>
<body>

    <div id="garage-viewport">
        <div class="stage">
            <div class="podium"></div>
            <div class="sketchfab-wrapper">
                <iframe 
                    title="chevrolet corvette c7.r" 
                    frameborder="0" 
                    allowfullscreen 
                    src="https://sketchfab.com/models/c514f64a6638447aa0026c332a283806/embed?autostart=1&ui_controls=1&ui_infos=0&ui_inspector=0&transparent=1&ui_theme=dark">
                </iframe>
            </div>
        </div>
    </div>

    <div class="ui-container">
        <button onclick="alert('Engine Revving!')">REV ENGINE</button>
        <button class="play-btn" onclick="alert('Starting Race!')">PLAY >></button>
    </div>

</body>
</html>
