<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: #060a18; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* The Garage Environment */
        .garage-bg { 
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle, #1a2a6c 0%, #060a18 70%); 
            display: flex; align-items: center; justify-content: center;
        }

        /* HUD LAYOUT */
        .top-bar { position: absolute; top: 10px; width: 95%; display: flex; justify-content: space-between; }
        .side-bar { position: absolute; left: 10px; top: 20%; display: flex; flex-direction: column; gap: 15px; }
        .bottom-nav { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; }

        /* The Rotating Car */
        #car-display { width: 300px; height: 150px; background: #0056b3; border-radius: 20px; 
                       box-shadow: 0 20px 50px rgba(0,0,0,0.8); transition: transform 0.5s; }
        
        /* Play Button */
        .play-btn { padding: 20px 60px; background: #32cd32; border: none; font-size: 24px; font-weight: bold; cursor: pointer; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="garage-bg">
        <!-- Top Stats -->
        <div class="top-bar">
            <div>Stars: 05.8K</div>
            <div>Coins: 10.5K</div>
        </div>

        <!-- Sidebar -->
        <div class="side-bar">
            <button>SPIN WHEEL</button>
            <button>DAILY REWARD</button>
        </div>

        <!-- Car in the center -->
        <div id="car-display"></div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button>RATE US</button>
            <button>RESUME</button>
            <button class="play-btn" onclick="startGame()">PLAY >></button>
        </div>
    </div>

    <script>
        let angle = 0;
        const car = document.getElementById('car-display');

        // Simple rotation animation
        function animate() {
            angle += 0.5;
            car.style.transform = `rotateY(${angle}deg)`;
            requestAnimationFrame(animate);
        }
        animate();

        function startGame() { alert("Starting Ignition Royale..."); }
    </script>
</body>
</html>
