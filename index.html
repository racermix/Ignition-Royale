<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { background: #060a18; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    #showroomCanvas { border: 2px solid #d4af37; border-radius: 50%; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); }
  </style>
</head>
<body>
  <canvas id="showroomCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById('showroomCanvas');
    const ctx = canvas.getContext('2d');
    let angle = 0;

    function drawCar() {
      ctx.clearRect(0, 0, 400, 400);
      
      // 1. Draw Pedestal
      ctx.fillStyle = "#1a1f2e";
      ctx.beginPath();
      ctx.ellipse(200, 300, 100, 30, 0, 0, Math.PI * 2);
      ctx.fill();

      // 2. Rotate and Draw Car
      ctx.save();
      ctx.translate(200, 200);
      ctx.rotate(angle);
      
      // Car Body (Stylized)
      ctx.fillStyle = "#007bff";
      ctx.roundRect(-60, -25, 120, 50, 10); // Rounded Rectangle Body
      ctx.fill();
      
      // Car Windows
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(-30, -20, 25, 15); // Front
      ctx.fillRect(5, -20, 25, 15);   // Back
      
      ctx.restore();

      angle += 0.02; // Rotation Speed
      requestAnimationFrame(drawCar);
    }
    drawCar();
  </script>
</body>
</html>
