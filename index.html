<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignition Royale</title>
    <style>
        /* Base Setup */
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            background: #060a18;
        }
        
        /* The Garage Environment */
        #garage-viewport { 
            width: 100vw; height: 100vh; 
            background: url('garage.jpg') no-repeat center center; 
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* The 3D Embed Wrapper - Set to be transparent */
        .sketchfab-embed-wrapper { 
            width: 100%; height: 100%; 
            background: transparent; 
        }

        iframe { 
            width: 100%; height: 100%; 
            border: none; 
            background: transparent; 
        }

        /* HUD UI Elements */
        .bottom-nav { 
            position: absolute; bottom: 30px; width: 100%; 
            display: flex; justify-content: center; gap: 20px; 
            z-index: 10;
        }
        
        button { 
            padding: 15px 30px; background: rgba(0,0,0,0.6); 
            color: white; border: 1px solid #d4af37; 
            cursor: pointer; text-transform: uppercase; font-weight: bold; 
        }
        .play-btn { background: #32cd32; border: none; }
    </style>
</head>
<body>

    <div id="garage-viewport">
        <!-- 
            Added: &transparent=1 (removes black box)
            Added: &ui_theme=dark (matches your garage)
            Added: &ui_stop=1 (disables some UI elements)
        -->
        <div class="sketchfab-embed-wrapper">
            <iframe 
                title="C7 Corvette rally car" 
                frameborder="0" 
                allowfullscreen 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true" 
                allow="autoplay; fullscreen; xr-spatial-tracking" 
                src="https://sketchfab.com/models/0244735e425a4625bfa4d83267e7827a/embed?autostart=1&ui_controls=1&ui_infos=0&ui_inspector=0&transparent=1&ui_theme=dark">
            </iframe>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="alert('Revving Engine...')">REV ENGINE</button>
        <button class="play-btn" onclick="alert('Starting Race!')">PLAY >></button>
    </div>

</body>
</html>
