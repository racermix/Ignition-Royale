<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignition Royale</title>

    <!-- Google's <model-viewer> web component. Open source, no vendor
         dashboard/branding baked in — we fully control the styling. -->
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #060a18;
            font-family: sans-serif;
        }

        #garage-viewport {
            width: 100vw;
            height: 100vh;
            background: url('garage.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        #garage-viewport::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 0;
        }

        /* ── ROTATING SPOTLIGHTS ──────────────────────────────────
           Two conic-gradient beams that slowly sweep across the garage,
           screen-blended so they read as light rather than a flat shape. */
        .spotlight-sweep {
            position: absolute;
            inset: -20% -20%;
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.35;
        }
        .spotlight-sweep::before, .spotlight-sweep::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 140%; height: 140%;
            background: conic-gradient(from 0deg,
                transparent 0deg, transparent 350deg,
                rgba(212, 175, 55, 0.5) 355deg, transparent 360deg);
            transform-origin: center;
            animation: sweep 9s linear infinite;
        }
        .spotlight-sweep::after {
            background: conic-gradient(from 0deg,
                transparent 0deg, transparent 350deg,
                rgba(64, 156, 255, 0.4) 355deg, transparent 360deg);
            animation: sweep 13s linear infinite reverse;
        }
        @keyframes sweep {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to   { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ── FLOOR SHIMMER ─────────────────────────────────────────
           A soft diagonal shine that slowly sweeps across the lower
           third of the frame, simulating a reflective wet floor. */
        .floor-shimmer {
            position: absolute;
            left: -30%; right: -30%; bottom: 0;
            height: 38%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.5;
        }
        .floor-shimmer::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: -60%;
            width: 40%;
            background: linear-gradient(100deg, transparent, rgba(120, 190, 255, 0.18), transparent);
            animation: shimmerSlide 7s ease-in-out infinite;
        }
        @keyframes shimmerSlide {
            0%   { left: -60%; }
            50%  { left: 120%; }
            100% { left: 120%; }
        }

        /* ── DRIFTING SMOKE ────────────────────────────────────────
           Two large soft blurred blobs drifting slowly sideways,
           low opacity so it reads as haze rather than clouds. */
        .smoke-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .smoke-blob {
            position: absolute;
            bottom: -10%;
            width: 55%;
            height: 45%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(180, 200, 220, 0.10) 0%, transparent 70%);
            filter: blur(18px);
        }
        .smoke-blob.a { left: -10%; animation: smokeDriftA 22s ease-in-out infinite; }
        .smoke-blob.b { right: -15%; animation: smokeDriftB 28s ease-in-out infinite; }
        @keyframes smokeDriftA {
            0%, 100% { transform: translateX(0) scale(1); }
            50% { transform: translateX(12%) scale(1.1); }
        }
        @keyframes smokeDriftB {
            0%, 100% { transform: translateX(0) scale(1); }
            50% { transform: translateX(-10%) scale(1.05); }
        }

        /* ── DRIFTING DUST PARTICLES ───────────────────────────── */
        .dust-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .dust {
            position: absolute;
            bottom: 0;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.55);
            animation: dustFloat linear infinite;
        }
        @keyframes dustFloat {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            10%  { opacity: 0.7; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-90vh) translateX(20px); opacity: 0; }
        }

        /* ── LED STRIPS ────────────────────────────────────────── */
        .led-strip {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(90deg, transparent, #d4af37, #05d9e8, #d4af37, transparent);
            background-size: 200% 100%;
            animation: ledPulse 4s ease-in-out infinite;
            opacity: 0.55;
            filter: blur(1px);
        }
        .led-strip.top    { top: 0; left: 0; right: 0; height: 3px; }
        .led-strip.bottom { bottom: 0; left: 0; right: 0; height: 3px; }
        @keyframes ledPulse {
            0%, 100% { background-position: 0% 50%; opacity: 0.4; }
            50%      { background-position: 100% 50%; opacity: 0.75; }
        }

        /* ── GARAGE DOOR REVEAL ───────────────────────────────────
           A dark panel that "rolls up" once on page load, revealing
           the scene like a garage door opening. */
        .garage-door {
            position: absolute;
            inset: 0;
            z-index: 15;
            background: linear-gradient(#0a0a12, #14141c);
            transform-origin: top;
            animation: doorOpen 1.6s cubic-bezier(0.7, 0, 0.3, 1) forwards;
            animation-delay: 0.3s;
        }
        .garage-door::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                to bottom, rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 2px, transparent 2px, transparent 22px
            );
        }
        @keyframes doorOpen {
            from { transform: scaleY(1); }
            to   { transform: scaleY(0); }
        }

        /* ── CAR STAGE ─────────────────────────────────────────── */
        .car-stage {
            position: absolute;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: min(900px, 96vw);
            height: min(600px, 65vh);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* ── GROUND LIGHT / NEON UNDERGLOW ────────────────────────
           Color updates to loosely match the selected paint variant
           via JS (see script), so the glow feels tied to the car. */
        .ground-light {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 25px;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(90, 180, 255, 0.85) 0%, rgba(64, 156, 255, 0.4) 55%, transparent 80%);
            filter: blur(3px);
            transition: background 0.4s ease;
            animation: underglowPulse 2.4s ease-in-out infinite;
        }
        @keyframes underglowPulse {
            0%, 100% { opacity: 0.85; }
            50%      { opacity: 1; }
        }
        .ground-light::after {
            content: '';
            position: absolute;
            inset: 3px 28% 1px 28%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(200, 230, 255, 0.9) 0%, transparent 70%);
            filter: blur(1.5px);
        }

        /* ── BRAKE LIGHT FLASH (triggered by REV ENGINE) ─────────── */
        .brake-flash {
            position: absolute;
            bottom: 16%;
            left: 50%;
            transform: translateX(-50%);
            width: 18%;
            height: 14px;
            z-index: 3;
            pointer-events: none;
            border-radius: 4px;
            background: radial-gradient(ellipse at center, rgba(255, 40, 40, 0.9) 0%, transparent 75%);
            opacity: 0;
        }
        .brake-flash.flash {
            animation: brakeFlash 0.5s ease-out 2;
        }
        @keyframes brakeFlash {
            0%, 100% { opacity: 0; }
            50%      { opacity: 1; }
        }

        /* ── EXHAUST PUFFS (spawned by REV ENGINE) ────────────────── */
        .exhaust-puff {
            position: absolute;
            bottom: 14%;
            left: 50%;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 200, 210, 0.5), transparent 70%);
            pointer-events: none;
            z-index: 3;
            animation: puffOut 1s ease-out forwards;
        }
        @keyframes puffOut {
            0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0.7; }
            100% { transform: translate(calc(-50% + var(--drift, 0px)), -60px) scale(2.4); opacity: 0; }
        }

        /* ── 3D CAR VIEWER ─────────────────────────────────────── */
        model-viewer {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            background: transparent;
            touch-action: none;
        }

        /* ── CAR SELECTOR ──────────────────────────────────────── */
        .selector-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 6;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.15s ease, transform 0.1s ease;
            user-select: none;
        }
        .selector-arrow:hover { background: rgba(212, 175, 55, 0.2); }
        .selector-arrow:active { transform: translateY(-50%) scale(0.92); }
        .selector-arrow.prev { left: 4%; }
        .selector-arrow.next { right: 4%; }

        .selector-dots {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            display: flex;
            gap: 10px;
        }
        .selector-dots .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
        }
        .selector-dots .dot.active {
            background: #d4af37;
            border-color: #d4af37;
            transform: scale(1.2);
        }

        /* ── CAR INFO TAG ───────────────────────────────────────── */
        .car-info-tag {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            backdrop-filter: blur(4px);
            line-height: 1.5;
        }
        .car-info-tag strong { color: #d4af37; display: block; font-size: 14px; }

        .model-credit {
            position: absolute;
            bottom: 6px;
            right: 10px;
            z-index: 5;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
        }
        .model-credit a { color: inherit; text-decoration: none; }

        /* ── AMBIENT AUDIO TOGGLE ─────────────────────────────────── */
        .ambient-toggle {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 6;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.5);
            background: rgba(0, 0, 0, 0.55);
            color: #d4af37;
            cursor: pointer;
            font-size: 15px;
            backdrop-filter: blur(4px);
        }

        /* ── BOTTOM BUTTONS ─────────────────────────────────────── */
        .ui-container {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 16px;
        }

        .ui-container button {
            padding: 16px 36px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }
        .ui-container button:active { transform: scale(0.96); }

        .rev-btn {
            background: rgba(0, 0, 0, 0.7);
            color: #d4af37;
            border: 2px solid #d4af37;
        }
        .rev-btn:hover { background: rgba(212, 175, 55, 0.15); }

        .play-btn {
            background: #32cd32;
            color: #0a1f0a;
            border: none;
            box-shadow: 0 4px 20px rgba(50, 205, 50, 0.4);
        }
        .play-btn:hover { opacity: 0.88; }

        /* ── REV ANIMATION ─────────────────────────────────────── */
        @keyframes revShake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            20%        { transform: translate(calc(-50% - 3px), -50%) rotate(-0.5deg); }
            40%        { transform: translate(calc(-50% + 3px), -50%) rotate(0.5deg); }
            60%        { transform: translate(calc(-50% - 2px), -50%) rotate(-0.3deg); }
            80%        { transform: translate(calc(-50% + 2px), -50%) rotate(0.3deg); }
        }
        .car-stage.revving { animation: revShake 0.18s linear 5; }

        /* ── MOBILE LANDSCAPE RESPONSIVENESS ─────────────────────── */
        @media (max-height: 500px) and (orientation: landscape) {
            .car-stage {
                height: 80vh;
                top: 62%;
            }
            .ui-container {
                bottom: 3%;
                transform: translateX(-50%) scale(0.85);
            }
            .ground-light {
                bottom: 8%;
            }
            .selector-arrow {
                width: 36px; height: 36px; font-size: 16px;
            }
            .car-info-tag {
                top: 8px; left: 8px; padding: 6px 10px;
            }
        }
    </style>
</head>
<body>

<div id="garage-viewport">

    <div class="spotlight-sweep"></div>
    <div class="floor-shimmer"></div>
    <div class="smoke-layer">
        <div class="smoke-blob a"></div>
        <div class="smoke-blob b"></div>
    </div>
    <div class="dust-layer" id="dustLayer"></div>
    <div class="led-strip top"></div>
    <div class="led-strip bottom"></div>

    <div class="car-info-tag">
        <strong id="carName">Concept GT</strong>
        <span id="carTrim">Carmine Candy</span>
    </div>

    <button class="ambient-toggle" id="ambientBtn" onclick="toggleAmbient()">🔈</button>

    <div class="car-stage" id="carStage">

        <div class="ground-light" id="groundLight"></div>
        <div class="brake-flash" id="brakeFlash"></div>

        <model-viewer
            id="carViewer"
            src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CarConcept/glTF-Binary/CarConcept.glb"
            alt="Concept GT showcase car"
            camera-controls
            disable-pan
            auto-rotate
            rotation-per-second="8deg"
            scale="1.3 1.3 1.3"
            camera-orbit="35deg 80deg 65%"
            camera-target="0m 0.15m 0m"
            field-of-view="30deg"
            min-camera-orbit="auto 58deg auto"
            max-camera-orbit="auto 98deg auto"
            min-field-of-view="22deg"
            max-field-of-view="40deg"
            interaction-prompt="none"
            shadow-intensity="1.1"
            shadow-softness="0.8"
            environment-image="neutral"
            exposure="1.1">
        </model-viewer>

        <div class="selector-arrow prev" onclick="changeCar(-1)">&#10094;</div>
        <div class="selector-arrow next" onclick="changeCar(1)">&#10095;</div>

        <div class="selector-dots" id="selectorDots"></div>

    </div>

    <div class="ui-container">
        <button class="rev-btn" onclick="revEngine()">REV ENGINE</button>
        <button class="play-btn" onclick="startRace()">PLAY &gt;&gt;</button>
    </div>

    <div class="model-credit">
        "Car Concept" by Khronos Group, <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>
    </div>

    <div class="garage-door"></div>

</div>

<script>
    // ── DUST PARTICLES ───────────────────────────────────────────
    const dustLayer = document.getElementById('dustLayer');
    for (let i = 0; i < 26; i++) {
        const d = document.createElement('div');
        d.className = 'dust';
        d.style.left = Math.random() * 100 + '%';
        d.style.animationDuration = (10 + Math.random() * 14) + 's';
        d.style.animationDelay = (Math.random() * 14) + 's';
        dustLayer.appendChild(d);
    }

    // ── REV ENGINE: shake + brake flash + exhaust puffs ─────────
    function revEngine() {
        const stage = document.getElementById('carStage');
        stage.classList.remove('revving');
        void stage.offsetWidth;
        stage.classList.add('revving');
        stage.addEventListener('animationend', () => stage.classList.remove('revving'), { once: true });

        const brake = document.getElementById('brakeFlash');
        brake.classList.remove('flash');
        void brake.offsetWidth;
        brake.classList.add('flash');

        for (let i = 0; i < 5; i++) {
            setTimeout(() => spawnExhaustPuff(), i * 90);
        }

        playRevSound();
    }

    function spawnExhaustPuff() {
        const puff = document.createElement('div');
        puff.className = 'exhaust-puff';
        puff.style.setProperty('--drift', (Math.random() * 30 - 15) + 'px');
        document.getElementById('carStage').appendChild(puff);
        setTimeout(() => puff.remove(), 1100);
    }

    // ── SYNTHESIZED AUDIO (no external files needed) ─────────────
    let audioCtx = null, ambientNodes = null, ambientOn = false;
    function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function toggleAmbient() {
        ensureAudio();
        ambientOn = !ambientOn;
        document.getElementById('ambientBtn').textContent = ambientOn ? '🔊' : '🔈';
        if (ambientOn) startAmbient(); else stopAmbient();
    }
    function startAmbient() {
        const o1 = audioCtx.createOscillator();
        const o2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        o1.type = 'sine'; o1.frequency.value = 55;
        o2.type = 'sine'; o2.frequency.value = 82.5;
        gain.gain.value = 0.02;
        o1.connect(gain); o2.connect(gain); gain.connect(audioCtx.destination);
        o1.start(); o2.start();
        ambientNodes = { o1, o2, gain };
    }
    function stopAmbient() {
        if (!ambientNodes) return;
        ambientNodes.o1.stop(); ambientNodes.o2.stop();
        ambientNodes = null;
    }
    function playRevSound() {
        ensureAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.25);
        osc.frequency.exponentialRampToValueAtTime(90, audioCtx.currentTime + 0.6);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.65);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.65);
    }

    // ── START RACE ────────────────────────────────────────────────
    function startRace() {
        const selectedVariant = encodeURIComponent(carOptions[currentCarIndex].variant);
        window.location.href = `game.html?car=${selectedVariant}`;
    }

    // ── CAR SELECTOR (3 built-in paint variants via KHR_materials_variants) ──
    const carOptions = [
        { variant: 'Carmine Candy',    label: 'Carmine Candy',    glow: 'rgba(255, 70, 70, 0.85)' },
        { variant: 'Pearly Swirly',    label: 'Pearly Swirly',    glow: 'rgba(220, 230, 255, 0.85)' },
        { variant: 'Torched Graphite', label: 'Torched Graphite', glow: 'rgba(90, 180, 255, 0.85)' }
    ];
    let currentCarIndex = 0;

    const viewer = document.getElementById('carViewer');
    const trimLabel = document.getElementById('carTrim');
    const dotsWrap = document.getElementById('selectorDots');
    const groundLight = document.getElementById('groundLight');

    carOptions.forEach((opt, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => selectCar(i);
        dotsWrap.appendChild(dot);
    });

    function selectCar(index) {
        currentCarIndex = (index + carOptions.length) % carOptions.length;
        const opt = carOptions[currentCarIndex];
        viewer.variantName = opt.variant;
        trimLabel.textContent = opt.label;
        groundLight.style.background =
            `radial-gradient(ellipse at center, ${opt.glow} 0%, rgba(64,156,255,0.35) 55%, transparent 80%)`;
        [...dotsWrap.children].forEach((dot, i) => {
            dot.classList.toggle('active', i === currentCarIndex);
        });
    }

    function changeCar(direction) {
        selectCar(currentCarIndex + direction);
    }

    viewer.addEventListener('load', () => {
        viewer.variantName = carOptions[currentCarIndex].variant;
    });
</script>

</body>
</html>
