<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignition Royale</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #060a18;
            font-family: sans-serif;
        }

        /* Full-screen garage backdrop */
        #garage-viewport {
            width: 100vw;
            height: 100vh;
            background: url('garage.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Dark overlay so UI elements stay readable */
        #garage-viewport::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 0;
        }

        /* ── CAR STAGE ─────────────────────────────────────────── */
        /* This is the bounded centered container for the car */
        .car-stage {
            position: relative;
            z-index: 1;
            width: min(680px, 92vw);
            /* Height leaves room for podium + buttons below */
            height: min(420px, 52vh);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* car sits above the podium */
        }

        /* The podium — a glowing white ellipse at the base of the stage */
        .podium {
            position: absolute;
            bottom: -18px;  /* slightly below the iframe so it peeks out */
            left: 50%;
            transform: translateX(-50%);
            width: 68%;
            height: 44px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.55) 40%, transparent 75%);
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
            filter: blur(1px);
        }

        /* Subtle glow ring around the podium base */
        .podium::after {
            content: '';
            position: absolute;
            inset: 6px 10px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 30px 12px rgba(255, 255, 255, 0.25);
        }

        /* ── IFRAME WRAPPER ─────────────────────────────────────── */
        /* Sits inside the stage, above the podium */
        .sketchfab-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
            /* Subtle border so the car stage has definition against the garage */
            border-radius: 6px;
            overflow: hidden;
        }

        /* Force the iframe to fill only its wrapper, not the whole page */
        .sketchfab-wrapper iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── CAR INFO TAG ───────────────────────────────────────── */
        .car-info-tag {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            backdrop-filter: blur(4px);
            line-height: 1.5;
        }
        .car-info-tag strong { color: #d4af37; display: block; font-size: 14px; }

        /* ── BOTTOM BUTTONS ─────────────────────────────────────── */
        .ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 16px;
            margin-top: 36px; /* space between podium glow and buttons */
        }

        .ui-container button {
            padding: 16px 36px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }
        .ui-container button:active { transform: scale(0.96); }

        .rev-btn {
            background: rgba(0, 0, 0, 0.7);
            color: #d4af37;
            border: 2px solid #d4af37;
        }
        .rev-btn:hover { background: rgba(212, 175, 55, 0.15); }

        .play-btn {
            background: #32cd32;
            color: #0a1f0a;
            border: none;
            box-shadow: 0 4px 20px rgba(50, 205, 50, 0.4);
        }
        .play-btn:hover { opacity: 0.88; }

        /* ── REV ANIMATION ─────────────────────────────────────── */
        @keyframes revShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20%       { transform: translateX(-3px) rotate(-0.5deg); }
            40%       { transform: translateX(3px) rotate(0.5deg); }
            60%       { transform: translateX(-2px) rotate(-0.3deg); }
            80%       { transform: translateX(2px) rotate(0.3deg); }
        }
        .car-stage.revving { animation: revShake 0.18s linear 5; }
    </style>
</head>
<body>

<div id="garage-viewport">

    <!-- Car info badge -->
    <div class="car-info-tag">
        <strong>Chevrolet Corvette C7.R</strong>
        by amogusstrikesback2
    </div>

    <!-- Centered car stage -->
    <div class="car-stage" id="carStage">

        <!-- Podium glow beneath the car -->
        <div class="podium"></div>

        <!-- 3D car viewer — bounded to this container only -->
        <div class="sketchfab-wrapper">
            <iframe
                title="Chevrolet Corvette C7.R"
                frameborder="0"
                allowfullscreen
                mozallowfullscreen="true"
                webkitallowfullscreen="true"
                allow="autoplay; fullscreen; xr-spatial-tracking"
                src="https://sketchfab.com/models/c514f64a6638447aa0026c332a283806/embed?autostart=1&ui_controls=1&ui_infos=0&ui_inspector=0&transparent=1&ui_theme=dark&camera=0">
            </iframe>
        </div>

    </div>

    <!-- Action buttons -->
    <div class="ui-container">
        <button class="rev-btn" onclick="revEngine()">REV ENGINE</button>
        <button class="play-btn" onclick="startRace()">PLAY &gt;&gt;</button>
    </div>

</div>

<script>
    function revEngine() {
        const stage = document.getElementById('carStage');
        stage.classList.remove('revving');
        // Force reflow so the animation restarts cleanly
        void stage.offsetWidth;
        stage.classList.add('revving');
        stage.addEventListener('animationend', () => stage.classList.remove('revving'), { once: true });
    }

    function startRace() {
        alert('Starting Race!');
    }
</script>

</body>
</html>
