<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ignition Royale - Garage</title>
  <style>
    body { margin: 0; background: #060a18; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
    
    /* Layout */
    .garage-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    
    /* Showroom Area */
    .showroom { width: 80%; height: 50%; border: 2px solid #d4af37; border-radius: 15px; background: linear-gradient(to bottom, #1a1f2e, #060a18); display: flex; align-items: center; justify-content: center; position: relative; }
    
    /* The Blue Starter Car */
    .car-preview { width: 150px; height: 80px; background: #007bff; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; }
    .car-preview::after { content: "STARTER"; position: absolute; top: -30px; left: 0; width: 100%; text-align: center; font-weight: bold; color: #d4af37; }

    /* Navigation */
    .nav-bar { margin-top: 30px; display: flex; gap: 20px; }
    button { padding: 15px 30px; background: #d4af37; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #060a18; }
    button:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <div class="garage-container">
    <h1>IGNITION ROYALE</h1>
    
    <div class="showroom">
      <div class="car-preview"></div>
    </div>

    <div class="nav-bar">
      <button onclick="goToRacing()">START RACE</button>
      <button onclick="openShop()">SHOP/CUSTOMIZE</button>
    </div>
  </div>

  <script>
    function goToRacing() {
      // Logic to switch to the canvas race screen
      console.log("Entering the circuit...");
    }
    
    function openShop() {
      // Logic to open the car collection/tattoos/tires page
      console.log("Opening showroom...");
    }
  </script>
</body>
</html>
