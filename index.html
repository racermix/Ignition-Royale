<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignition Royale</title>

    <!-- Google's <model-viewer> web component. Open source, no vendor
         dashboard/branding baked in — we fully control the styling. -->
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #060a18;
            font-family: sans-serif;
        }

        #garage-viewport {
            width: 100vw;
            height: 100vh;
            background: url('garage.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        #garage-viewport::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            pointer-events: none;
            z-index: 0;
        }

        /* ── CAR STAGE ─────────────────────────────────────────── */
        .car-stage {
            position: absolute;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            width: min(900px, 96vw);
            height: min(600px, 65vh);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* ── GROUND LIGHT ───────────────────────────────────────── */
        .ground-light {
            position: absolute;
            bottom: 12%; 
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 25px;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(90, 180, 255, 0.85) 0%, rgba(64, 156, 255, 0.4) 55%, transparent 80%);
            filter: blur(3px);
        }

        .ground-light::after {
            content: '';
            position: absolute;
            inset: 3px 28% 1px 28%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(200, 230, 255, 0.9) 0%, transparent 70%);
            filter: blur(1.5px);
        }

        /* ── 3D CAR VIEWER ─────────────────────────────────────── */
        model-viewer {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            --poster-color: transparent;
            background: transparent;
            touch-action: none;
        }

        /* ── CAR SELECTOR ──────────────────────────────────────── */
        .selector-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 6;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.15s ease, transform 0.1s ease;
            user-select: none;
        }
        .selector-arrow:hover { background: rgba(212, 175, 55, 0.2); }
        .selector-arrow:active { transform: translateY(-50%) scale(0.92); }
        .selector-arrow.prev { left: 4%; }
        .selector-arrow.next { right: 4%; }

        .selector-dots {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            display: flex;
            gap: 10px;
        }
        .selector-dots .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
        }
        .selector-dots .dot.active {
            background: #d4af37;
            border-color: #d4af37;
            transform: scale(1.2);
        }

        /* ── CAR INFO TAG ───────────────────────────────────────── */
        .car-info-tag {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            backdrop-filter: blur(4px);
            line-height: 1.5;
        }
        .car-info-tag strong { color: #d4af37; display: block; font-size: 14px; }

        .model-credit {
            position: absolute;
            bottom: 6px;
            right: 10px;
            z-index: 5;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
        }
        .model-credit a { color: inherit; text-decoration: none; }

        /* ── BOTTOM BUTTONS ─────────────────────────────────────── */
        .ui-container {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 16px;
        }

        .ui-container button {
            padding: 16px 36px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }
        .ui-container button:active { transform: scale(0.96); }

        .rev-btn {
            background: rgba(0, 0, 0, 0.7);
            color: #d4af37;
            border: 2px solid #d4af37;
        }
        .rev-btn:hover { background: rgba(212, 175, 55, 0.15); }

        .play-btn {
            background: #32cd32;
            color: #0a1f0a;
            border: none;
            box-shadow: 0 4px 20px rgba(50, 205, 50, 0.4);
        }
        .play-btn:hover { opacity: 0.88; }

        /* ── REV ANIMATION ─────────────────────────────────────── */
        @keyframes revShake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            20%        { transform: translate(calc(-50% - 3px), -50%) rotate(-0.5deg); }
            40%        { transform: translate(calc(-50% + 3px), -50%) rotate(0.5deg); }
            60%        { transform: translate(calc(-50% - 2px), -50%) rotate(-0.3deg); }
            80%        { transform: translate(calc(-50% + 2px), -50%) rotate(0.3deg); }
        }
        .car-stage.revving { animation: revShake 0.18s linear 5; }

        /* ── MOBILE LANDSCAPE RESPONSIVENESS ─────────────────────── */
        @media (max-height: 500px) and (orientation: landscape) {
            .car-stage {
                height: 80vh;
                top: 62%;
            }
            .ui-container {
                bottom: 3%;
                transform: translateX(-50%) scale(0.85);
            }
            .ground-light {
                bottom: 8%; 
            }
            .selector-arrow {
                width: 36px; height: 36px; font-size: 16px;
            }
            .car-info-tag {
                top: 8px; left: 8px; padding: 6px 10px;
            }
        }
    </style>
</head>
<body>

<div id="garage-viewport">

    <div class="car-info-tag">
        <strong id="carName">Concept GT</strong>
        <span id="carTrim">Carmine Candy</span>
    </div>

    <div class="car-stage" id="carStage">

        <div class="ground-light"></div>

        <model-viewer
            id="carViewer"
            src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CarConcept/glTF-Binary/CarConcept.glb"
            alt="Concept GT showcase car"
            camera-controls
            disable-pan
            scale="1.3 1.3 1.3" 
            camera-orbit="35deg 80deg 65%"
            camera-target="0m 0.15m 0m"
            field-of-view="30deg"
            min-camera-orbit="auto 58deg auto"
            max-camera-orbit="auto 98deg auto"
            min-field-of-view="22deg"
            max-field-of-view="40deg"
            interaction-prompt="none"
            shadow-intensity="1.1"
            shadow-softness="0.8"
            environment-image="neutral"
            exposure="1.1">
        </model-viewer>

        <div class="selector-arrow prev" onclick="changeCar(-1)">&#10094;</div>
        <div class="selector-arrow next" onclick="changeCar(1)">&#10095;</div>

        <div class="selector-dots" id="selectorDots"></div>

    </div>

    <div class="ui-container">
        <button class="rev-btn" onclick="revEngine()">REV ENGINE</button>
        <button class="play-btn" onclick="startRace()">PLAY &gt;&gt;</button>
    </div>

    <div class="model-credit">
        "Car Concept" by Khronos Group, <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>
    </div>

</div>

<script>
    function revEngine() {
        const stage = document.getElementById('carStage');
        stage.classList.remove('revving');
        void stage.offsetWidth;
        stage.classList.add('revving');
        stage.addEventListener('animationend', () => stage.classList.remove('revving'), { once: true });
    }

    // Updated startRace function to transition to game.html
    function startRace() {
        const selectedVariant = encodeURIComponent(carOptions[currentCarIndex].variant);
        window.location.href = `game.html?car=${selectedVariant}`;
    }

    const carOptions = [
        { variant: 'Carmine Candy',   label: 'Carmine Candy' },
        { variant: 'Pearly Swirly',   label: 'Pearly Swirly' },
        { variant: 'Torched Graphite', label: 'Torched Graphite' }
    ];
    let currentCarIndex = 0;

    const viewer = document.getElementById('carViewer');
    const trimLabel = document.getElementById('carTrim');
    const dotsWrap = document.getElementById('selectorDots');

    carOptions.forEach((opt, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => selectCar(i);
        dotsWrap.appendChild(dot);
    });

    function selectCar(index) {
        currentCarIndex = (index + carOptions.length) % carOptions.length;
        const opt = carOptions[currentCarIndex];
        viewer.variantName = opt.variant;
        trimLabel.textContent = opt.label;
        [...dotsWrap.children].forEach((dot, i) => {
            dot.classList.toggle('active', i === currentCarIndex);
        });
    }

    function changeCar(direction) {
        selectCar(currentCarIndex + direction);
    }

    viewer.addEventListener('load', () => {
        viewer.variantName = carOptions[currentCarIndex].variant;
    });
</script>

</body>
</html>
