<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignition Royale</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #060a18; }
        
        /* The Garage */
        #garage-viewport { 
            width: 100vw; height: 100vh; 
            background: url('garage.jpg') no-repeat center center; 
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        /* The 3D Embed */
        .sketchfab-embed-wrapper { width: 80%; height: 60%; }
        iframe { width: 100%; height: 100%; border: none; }

        /* HUD UI */
        .bottom-nav { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        button { padding: 15px 30px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #d4af37; cursor: pointer; }
    </style>
</head>
<body>

    <div id="garage-viewport">
        <!-- Sketchfab Embed -->
        <div class="sketchfab-embed-wrapper">
            <iframe title="C7 Corvette rally car" frameborder="0" allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true" allow="autoplay; fullscreen; xr-spatial-tracking" src="https://sketchfab.com/models/0244735e425a4625bfa4d83267e7827a/embed?autostart=1&ui_controls=1&ui_infos=0&ui_inspector=0"></iframe>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="alert('Engine Revving!')">REV ENGINE</button>
        <button>PLAY >></button>
    </div>

</body>
</html>
