<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ignition Royale - Bangkok Run</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #0b0f19; /* Deep night sky */
            font-family: sans-serif;
            touch-action: none; /* Prevents mobile scrolling while playing */
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── UI OVERLAYS ───────────────────────────────────────── */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #d4af37;
        }

        #gameOverScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: auto;
        }

        #gameOverScreen h1 {
            color: #ff2a6d; /* Neon pink */
            font-size: 48px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px #ff2a6d;
        }

        #gameOverScreen p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .btn {
            background: #05d9e8; /* Neon cyan */
            color: #0b0f19;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(5, 217, 232, 0.4);
            transition: transform 0.1s ease;
        }

        .btn:active { transform: scale(0.95); }
        .btn.secondary {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud-top">
            <div id="scoreDisplay">Distance: 0m</div>
            <div id="speedDisplay">Speed: 0 km/h</div>
        </div>
    </div>

    <div id="gameOverScreen">
        <h1>Wrecked!</h1>
        <p id="finalScore">Distance: 0m</p>
        <div>
            <button class="btn" onclick="resetGame()">Race Again</button>
            <button class="btn secondary" onclick="window.location.href='index.html'">Garage</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const speedDisplay = document.getElementById('speedDisplay');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScore = document.getElementById('finalScore');

    // Setup canvas sizing
    let width, height;
    function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── GAME VARIABLES ──────────────────────────────────────────
    let isGameOver = false;
    let score = 0;
    let speed = 5; // Base downward scrolling speed
    let baseSpeed = 5;
    
    // Read car variant from URL (optional, can be used for color later)
    const urlParams = new URLSearchParams(window.location.search);
    const playerVariant = urlParams.get('car') || 'Carmine Candy';

    // Player Object
    const player = {
        w: 40,
        h: 80,
        x: width / 2,
        y: height - 120,
        color: playerVariant === 'Pearly Swirly' ? '#e0e0e0' : (playerVariant === 'Torched Graphite' ? '#555' : '#d4af37'),
        speedX: 0,
        maxSpeedX: 8
    };

    // Environment and obstacles
    let roadLines = [];
    let obstacles = [];
    const laneWidth = width > 600 ? 150 : 100;
    const roadWidth = laneWidth * 3;
    const roadLeftX = (width - roadWidth) / 2;

    // Controls
    const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };

    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
    });
    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
    });

    // Touch Controls for Mobile
    let touchX = null;
    canvas.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; });
    canvas.addEventListener('touchmove', (e) => { touchX = e.touches[0].clientX; });
    canvas.addEventListener('touchend', () => { touchX = null; });

    // ── GAME FUNCTIONS ──────────────────────────────────────────
    function spawnObstacle() {
        // Pick one of the 3 lanes
        const laneIndex = Math.floor(Math.random() * 3);
        const obstacleX = roadLeftX + (laneIndex * laneWidth) + (laneWidth / 2) - 20;
        
        // Sometimes spawn a smaller "tuk-tuk" style obstacle
        const isTukTuk = Math.random() > 0.7;
        
        obstacles.push({
            x: obstacleX,
            y: -100,
            w: isTukTuk ? 30 : 40,
            h: isTukTuk ? 50 : 80,
            speedY: speed * (Math.random() * 0.4 + 0.3), // They move slower than the player
            color: isTukTuk ? '#01c38d' : '#ff2a6d' // Neon green/cyan for tuk-tuks, pink for cars
        });
    }

    function drawCar(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 8);
        ctx.fill();
        
        // Windshield
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.roundRect(x + 5, y + 15, w - 10, 20, 3);
        ctx.fill();

        // Tail lights glow
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(x + 5, y + h - 5, 10, 5);
        ctx.fillRect(x + w - 15, y + h - 5, 10, 5);
        ctx.shadowBlur = 0; // reset
    }

    function update() {
        if (isGameOver) return;

        // Player Movement Logic
        if (keys.ArrowLeft || keys.a || (touchX !== null && touchX < width / 2)) {
            player.x -= player.maxSpeedX;
        }
        if (keys.ArrowRight || keys.d || (touchX !== null && touchX > width / 2)) {
            player.x += player.maxSpeedX;
        }

        // Clamp player to road bounds
        if (player.x < roadLeftX) player.x = roadLeftX;
        if (player.x + player.w > roadLeftX + roadWidth) player.x = roadLeftX + roadWidth - player.w;

        // Difficulty scaling
        speed = baseSpeed + (score / 1000);
        score += speed / 10;

        // Update UI
        scoreDisplay.textContent = `Distance: ${Math.floor(score)}m`;
        speedDisplay.textContent = `Speed: ${Math.floor(speed * 15)} km/h`;

        // Road Lines (Scrolling effect)
        roadLines.forEach(line => {
            line.y += speed;
            if (line.y > height) line.y = -50;
        });

        // Obstacles
        if (Math.random() < 0.02 + (speed * 0.001)) { // Spawn rate increases slightly with speed
            spawnObstacle();
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            // Obstacles move relative to road speed minus their own speed
            obs.y += (speed - obs.speedY); 

            // Collision Detection (AABB)
            if (player.x < obs.x + obs.w &&
                player.x + player.w > obs.x &&
                player.y < obs.y + obs.h &&
                player.h + player.y > obs.y) {
                gameOver();
            }

            // Remove off-screen obstacles
            if (obs.y > height) {
                obstacles.splice(i, 1);
            }
        }
    }

    function draw() {
        // Clear canvas
        ctx.fillStyle = '#0b0f19';
        ctx.fillRect(0, 0, width, height);

        // Draw Bangkok Neon City Glow (Sides)
        ctx.fillStyle = 'rgba(255, 42, 109, 0.05)'; // Pink glow left
        ctx.fillRect(0, 0, roadLeftX, height);
        ctx.fillStyle = 'rgba(5, 217, 232, 0.05)'; // Cyan glow right
        ctx.fillRect(roadLeftX + roadWidth, 0, width - (roadLeftX + roadWidth), height);

        // Draw Road
        ctx.fillStyle = '#1a1f2e';
        ctx.fillRect(roadLeftX, 0, roadWidth, height);

        // Draw Neon Road Borders
        ctx.strokeStyle = '#05d9e8';
        ctx.lineWidth = 4;
        ctx.shadowColor = '#05d9e8';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(roadLeftX, 0); ctx.lineTo(roadLeftX, height);
        ctx.moveTo(roadLeftX + roadWidth, 0); ctx.lineTo(roadLeftX + roadWidth, height);
        ctx.stroke();
        ctx.shadowBlur = 0; // Reset shadow

        // Draw Lane Markers
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        roadLines.forEach(line => {
            ctx.fillRect(roadLeftX + laneWidth - 2, line.y, 4, 30);
            ctx.fillRect(roadLeftX + (laneWidth * 2) - 2, line.y, 4, 30);
        });

        // Draw Obstacles
        obstacles.forEach(obs => {
            drawCar(obs.x, obs.y, obs.w, obs.h, obs.color);
        });

        // Draw Player
        drawCar(player.x, player.y, player.w, player.h, player.color);
    }

    function gameLoop() {
        update();
        draw();
        if (!isGameOver) {
            requestAnimationFrame(gameLoop);
        }
    }

    function gameOver() {
        isGameOver = true;
        finalScore.textContent = `Distance: ${Math.floor(score)}m`;
        gameOverScreen.style.display = 'flex';
    }

    function resetGame() {
        isGameOver = false;
        score = 0;
        speed = baseSpeed;
        obstacles = [];
        player.x = width / 2;
        gameOverScreen.style.display = 'none';
        
        // Re-initialize road lines
        roadLines = [];
        for (let i = 0; i < height; i += 60) {
            roadLines.push({ y: i });
        }
        
        requestAnimationFrame(gameLoop);
    }

    // Initialize game
    resetGame();

</script>
</body>
</html>
