<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ignition Royale - Bangkok Neon Run</title>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#0a001f; }
        #game-container { width:100%; height:100%; }
        #ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; 
                    display:flex; flex-direction:column; justify-content:space-between; padding:20px; z-index:10; color:#fff; }
        .hud-top { display:flex; justify-content:space-between; font-size:22px; font-weight:bold; 
                   text-shadow:0 0 15px #05d9e8; }
        .overlay-screen { position:absolute; inset:0; background:rgba(10,0,31,0.95); backdrop-filter:blur(10px);
                          display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
        h1 { color:#ff2a6d; font-size:52px; text-shadow:0 0 30px #ff2a6d; }
        .btn { padding:16px 40px; font-size:20px; font-weight:900; text-transform:uppercase; border:none; border-radius:4px; margin:10px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div class="hud-top">
            <div id="scoreDisplay">DISTANCE: 0m</div>
            <div id="speedDisplay">SPEED: 0 km/h</div>
        </div>
    </div>

    <div id="loadingScreen" class="overlay-screen"><h1>ENTERING NEON BANGKOK...</h1></div>
    <div id="gameOverScreen" class="overlay-screen" style="display:none">
        <h1>WRECKED!</h1>
        <p id="finalScore">Distance: 0m</p>
        <button class="btn" style="background:#05d9e8;color:#000" onclick="resetGame()">RACE AGAIN</button>
        <button class="btn" style="background:#d4af37;color:#000" onclick="window.location.href='index.html'">GARAGE</button>
    </div>

<script>
// URL param for car color
const urlParams = new URLSearchParams(window.location.search);
const selectedVariant = urlParams.get('car') || 'Carmine Candy';

let isGameOver = false, distance = 0, currentSpeed = 0;
const maxSpeed = 75;

let baseCarModel = null, playerCar = null, trafficCars = [];
const lanes = [-4, 0, 4];
let laneZTracker = [0,0,0];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a001f);
scene.fog = new THREE.FogExp2(0x1a0033, 0.018); // lighter fog = better perf

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 4, 8);

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:"high-performance" });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false; // disable shadows for speed
document.getElementById('game-container').appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x445577, 0.5));
const pinkLight = new THREE.PointLight(0xff2a6d, 3, 60); pinkLight.position.set(-12,10,0);
const cyanLight = new THREE.PointLight(0x05d9e8, 3, 60); cyanLight.position.set(12,10,0);
scene.add(pinkLight, cyanLight);

// Road
const road = new THREE.Mesh(new THREE.PlaneGeometry(13,600), 
    new THREE.MeshStandardMaterial({color:0x111111, roughness:0.9}));
road.rotation.x = -Math.PI/2;
road.position.z = -100;
scene.add(road);

// Buildings - lighter version
const buildings = new THREE.Group();
scene.add(buildings);

function createBuilding(x, z) {
    const h = 15 + Math.random()*35;
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(6 + Math.random()*4, h, 6 + Math.random()*4),
        new THREE.MeshStandardMaterial({ color: 0x0a0a1f, emissive: 0x220033 })
    );
    mesh.position.set(x, h/2, z);
    
    // Neon edge
    const edges = new THREE.EdgesGeometry(mesh.geometry);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color: 0x00ffff}));
    mesh.add(line);
    
    buildings.add(mesh);
}

// Fewer but better placed buildings
for (let i = 0; i < 22; i++) {
    const z = -20 - i * 22;
    createBuilding(-13 - Math.random()*6, z);
    createBuilding( 13 + Math.random()*6, z);
}

// Rain - reduced count
const rainCount = 600;
const rainGeo = new THREE.BufferGeometry();
const rainPos = new Float32Array(rainCount * 3);
for (let i = 0; i < rainCount*3; i+=3) {
    rainPos[i]   = Math.random()*50 - 25;
    rainPos[i+1] = Math.random()*50;
    rainPos[i+2] = Math.random()*80 - 60;
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
const rain = new THREE.Points(rainGeo, new THREE.PointsMaterial({color:0x88ddff, size:0.2, transparent:true, opacity:0.6}));
scene.add(rain);

// Car loading
const loader = new THREE.GLTFLoader();
loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CarConcept/glTF-Binary/CarConcept.glb', gltf => {
    baseCarModel = gltf.scene;
    baseCarModel.scale.set(0.9,0.9,0.9);
    baseCarModel.rotation.y = Math.PI;

    playerCar = baseCarModel.clone();
    
    let color = 0xff0033;
    if (selectedVariant === 'Pearly Swirly') color = 0xdddddd;
    if (selectedVariant === 'Torched Graphite') color = 0x222222;

    playerCar.traverse(c => {
        if (c.isMesh) {
            c.material = c.material.clone();
            if (c.material.name.toLowerCase().includes('paint') || c.material.name.toLowerCase().includes('body')) {
                c.material.color.setHex(color);
            }
        }
    });

    playerCar.position.y = 0.8;
    scene.add(playerCar);

    document.getElementById('loadingScreen').style.display = 'none';
    spawnTraffic(); spawnTraffic();
    animate();
});

function spawnTraffic() {
    if (!baseCarModel || trafficCars.length > 9) return;
    
    const lane = Math.floor(Math.random()*3);
    const z = camera.position.z - 120 - Math.random()*40;
    
    if (laneZTracker[lane] < z + 25) return;

    const car = baseCarModel.clone();
    const tColor = [0xff0088, 0x00ffff, 0xffff00][Math.floor(Math.random()*3)];
    
    car.traverse(c => {
        if (c.isMesh && c.material) {
            c.material = c.material.clone();
            if (c.material.name.toLowerCase().includes('body')) c.material.color.setHex(tColor);
        }
    });

    car.position.set(lanes[lane], 0.8, z);
    car.userData = { speed: 12 + Math.random()*18, lane };
    
    scene.add(car);
    trafficCars.push(car);
    laneZTracker[lane] = z;
}

// Controls
const keys = {};
addEventListener('keydown', e => keys[e.key] = true);
addEventListener('keyup',   e => keys[e.key] = false);

let touchX = null;
addEventListener('touchstart', e => touchX = e.touches[0].clientX);
addEventListener('touchmove',  e => touchX = e.touches[0].clientX);
addEventListener('touchend',   () => touchX = null);

function animate() {
    if (isGameOver) return;
    requestAnimationFrame(animate);

    // Speed
    const accel = (keys['w']||keys['ArrowUp'] || (touchX && (touchX < innerWidth*0.33 || touchX > innerWidth*0.66))) ? 0.7 : 0;
    const brake = (keys['s']||keys['ArrowDown'] || (touchX && touchX > innerWidth*0.33 && touchX < innerWidth*0.66)) ? 2 : 0;
    currentSpeed = Math.max(0, Math.min(maxSpeed, currentSpeed + accel - brake - 0.25));

    distance += currentSpeed * 0.016;
    document.getElementById('scoreDisplay').textContent = `DISTANCE: ${Math.floor(distance)}m`;
    document.getElementById('speedDisplay').textContent = `SPEED: ${Math.floor(currentSpeed*3.6)} km/h`;

    // Steering
    if (currentSpeed > 5) {
        const dir = (keys['a']||keys['ArrowLeft'] || (touchX && touchX < innerWidth/2)) ? -1 : 
                    (keys['d']||keys['ArrowRight'] || (touchX && touchX > innerWidth/2)) ? 1 : 0;
        playerCar.position.x += dir * 0.4 * (currentSpeed/60);
        playerCar.position.x = Math.max(-4.8, Math.min(4.8, playerCar.position.x));
        playerCar.rotation.z = -playerCar.position.x * 0.07;
    }

    // World scroll
    buildings.children.forEach(b => {
        b.position.z += currentSpeed * 0.022;
        if (b.position.z > camera.position.z + 20) b.position.z -= 380;
    });

    // Traffic
    laneZTracker = [0,0,0];
    for (let i = trafficCars.length-1; i >= 0; i--) {
        const car = trafficCars[i];
        car.position.z += (currentSpeed - car.userData.speed) * 0.022;

        if (Math.abs(playerCar.position.x - car.position.x) < 2 && 
            Math.abs(playerCar.position.z - car.position.z) < 3) {
            gameOver();
            return;
        }

        if (car.position.z > camera.position.z + 15) {
            scene.remove(car);
            trafficCars.splice(i,1);
        } else {
            const idx = lanes.indexOf(Math.round(car.position.x));
            if (idx >= 0) laneZTracker[idx] = Math.min(laneZTracker[idx], car.position.z);
        }
    }

    // Spawn more aggressively
    if (Math.random() < 0.08 && trafficCars.length < 10) spawnTraffic();

    // Rain
    const pos = rain.geometry.attributes.position.array;
    for (let i = 1; i < pos.length; i += 3) {
        pos[i] -= 18;
        if (pos[i] < -10) pos[i] = 50;
    }
    rain.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
}

function gameOver() {
    isGameOver = true;
    document.getElementById('finalScore').textContent = `Distance: ${Math.floor(distance)}m`;
    document.getElementById('gameOverScreen').style.display = 'flex';
}

function resetGame() { location.reload(); }

addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
