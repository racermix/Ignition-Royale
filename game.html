<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ignition Royale - Bangkok Run</title>
    
    <!-- Three.js Core and GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: #03050a;
            font-family: sans-serif;
            touch-action: none;
        }

        #game-container {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── UI OVERLAYS ───────────────────────────────────────── */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #05d9e8;
        }

        /* ── MENUS ─────────────────────────────────────────────── */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: auto;
        }

        #gameOverScreen { display: none; }

        h1 {
            color: #ff2a6d;
            font-size: 48px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px #ff2a6d;
        }

        p { color: #fff; font-size: 24px; margin-bottom: 30px; }

        .btn {
            background: #05d9e8;
            color: #0b0f19;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(5, 217, 232, 0.4);
            transition: transform 0.1s ease;
        }

        .btn:active { transform: scale(0.95); }
        .btn.secondary {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            box-shadow: none;
        }

        /* Mobile controls hint */
        #mobile-controls {
            position: absolute;
            bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 14px; display: none;
        }
        @media (max-width: 768px) { #mobile-controls { display: block; } }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div class="hud-top">
            <div id="scoreDisplay">Distance: 0m</div>
            <div id="speedDisplay">Speed: 0 km/h</div>
        </div>
        <div id="mobile-controls">Tap Left/Right to Steer. Hold center to Brake.</div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="overlay-screen">
        <h1 style="color: #05d9e8; text-shadow: 0 0 20px #05d9e8;">Loading Assets...</h1>
        <p>Importing 3D Models & Neon Lights</p>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="overlay-screen">
        <h1>Wrecked!</h1>
        <p id="finalScore">Distance: 0m</p>
        <div>
            <button class="btn" onclick="resetGame()">Race Again</button>
            <button class="btn secondary" onclick="window.location.href='index.html'">Garage</button>
        </div>
    </div>

<script>
    // ── GAME STATE ─────────────────────────────────────────────
    let isGameOver = false;
    let distance = 0;
    let currentSpeed = 0; // m/s
    const maxSpeed = 60; // top speed
    const acceleration = 0.5;
    const braking = 1.5;
    const drag = 0.2;
    const steerSpeed = 0.3;

    let baseCarModel = null;
    let playerCar = null;
    let trafficCars = [];
    const lanes = [-3.5, 0, 3.5]; // Left, Center, Right lanes
    let laneZTracker = [0, 0, 0]; // Tracks the Z pos of the last car in each lane

    // ── SCENE SETUP ─────────────────────────────────────────────
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x03050a);
    scene.fog = new THREE.FogExp2(0x03050a, 0.015); // Fog hides horizon, blends city

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 3, 7); // Positioned slightly above and behind player
    camera.lookAt(0, 0, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // ── LIGHTING (Bangkok Vibe) ─────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x222233);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // Neon glows
    const pinkLight = new THREE.PointLight(0xff2a6d, 2, 50);
    pinkLight.position.set(-10, 5, 0);
    scene.add(pinkLight);

    const cyanLight = new THREE.PointLight(0x05d9e8, 2, 50);
    cyanLight.position.set(10, 5, 0);
    scene.add(cyanLight);

    // ── ENVIRONMENT ─────────────────────────────────────────────
    // Road
    const roadGeo = new THREE.PlaneGeometry(12, 400);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.z = -100;
    scene.add(road);

    // City Buildings (Procedural blocks on the sides)
    const buildings = new THREE.Group();
    scene.add(buildings);
    
    const neonColors = [0xff2a6d, 0x05d9e8, 0xd4af37, 0x9900ff];

    function createBuilding(x, z) {
        const height = Math.random() * 20 + 10;
        const geo = new THREE.BoxGeometry(5, height, 5);
        
        // Dark building with neon wireframe edges
        const mat = new THREE.MeshStandardMaterial({ color: 0x0a0a11 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, height/2, z);

        // Neon trim
        const edges = new THREE.EdgesGeometry(geo);
        const neonColor = neonColors[Math.floor(Math.random() * neonColors.length)];
        const lineMat = new THREE.LineBasicMaterial({ color: neonColor });
        const wireframe = new THREE.LineSegments(edges, lineMat);
        mesh.add(wireframe);

        buildings.add(mesh);
    }

    // Populate initial city
    for(let z = 10; z > -300; z -= 15) {
        createBuilding(-12 - Math.random()*5, z);
        createBuilding(12 + Math.random()*5, z);
    }

    // ── ASSET LOADING ───────────────────────────────────────────
    const loader = new THREE.GLTFLoader();
    const carUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CarConcept/glTF-Binary/CarConcept.glb';

    loader.load(carUrl, function(gltf) {
        baseCarModel = gltf.scene;
        // Scale and orient the car
        baseCarModel.scale.set(0.8, 0.8, 0.8);
        baseCarModel.rotation.y = Math.PI; // Face forward away from camera

        // Read intended color from URL
        const urlParams = new URLSearchParams(window.location.search);
        const variant = urlParams.get('car');
        let carColor = 0xff0000; // default red
        if(variant === 'Pearly Swirly') carColor = 0xe0e0e0;
        if(variant === 'Torched Graphite') carColor = 0x333333;

        // Clone for player
        playerCar = cloneCar(baseCarModel, carColor);
        playerCar.position.set(0, 0, 0); // Player sits at Z=0
        scene.add(playerCar);

        document.getElementById('loadingScreen').style.display = 'none';
        
        // Initial traffic population
        spawnTraffic();
        spawnTraffic();
        spawnTraffic();

        animate();
    });

    // Helper: Safely clone the GLTF scene and apply color tint
    function cloneCar(baseScene, hexColor) {
        const clone = baseScene.clone();
        clone.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                // If it looks like car paint, tint it
                if (child.material.name.toLowerCase().includes('paint') || child.material.name.toLowerCase().includes('body')) {
                    child.material.color.setHex(hexColor);
                }
            }
        });
        return clone;
    }

    // ── TRAFFIC SYSTEM ──────────────────────────────────────────
    function spawnTraffic() {
        if (!baseCarModel) return;

        const laneIndex = Math.floor(Math.random() * 3);
        const spawnZ = camera.position.z - 150 - Math.random() * 50; // Spawn far ahead

        // Anti-overlap check: Don't spawn if another car in this lane is too close
        if (laneZTracker[laneIndex] < spawnZ + 30) {
            return; 
        }

        const trafficColor = neonColors[Math.floor(Math.random() * neonColors.length)];
        const aiCar = cloneCar(baseCarModel, trafficColor);
        
        aiCar.position.set(lanes[laneIndex], 0, spawnZ);
        
        // Traffic metadata
        aiCar.userData = {
            speed: Math.random() * 15 + 10, // AI travels at 10-25 m/s
            width: 1.8,  // hitbox width
            length: 4.0  // hitbox length
        };

        scene.add(aiCar);
        trafficCars.push(aiCar);
        laneZTracker[laneIndex] = spawnZ;
    }

    // ── CONTROLS ────────────────────────────────────────────────
    const keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
    
    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

    // Touch Support
    let touchX = null;
    let isTouching = false;
    window.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; isTouching = true; });
    window.addEventListener('touchmove', (e) => { touchX = e.touches[0].clientX; });
    window.addEventListener('touchend', () => { touchX = null; isTouching = false; });

    // ── MAIN LOOP ───────────────────────────────────────────────
    function animate() {
        if (isGameOver) return;
        requestAnimationFrame(animate);

        // 1. Calculate Speed (Throttle/Brake)
        let isAccelerating = keys.w || keys.ArrowUp || (isTouching && (touchX < window.innerWidth*0.3 || touchX > window.innerWidth*0.7));
        let isBraking = keys.s || keys.ArrowDown || (isTouching && touchX > window.innerWidth*0.3 && touchX < window.innerWidth*0.7);

        if (isAccelerating) {
            currentSpeed += acceleration;
        } else if (isBraking) {
            currentSpeed -= braking;
        } else {
            currentSpeed -= drag;
        }
        
        currentSpeed = Math.max(0, Math.min(currentSpeed, maxSpeed));
        
        // Update UI
        distance += currentSpeed / 60; // approx distance per frame
        document.getElementById('scoreDisplay').textContent = `Distance: ${Math.floor(distance)}m`;
        document.getElementById('speedDisplay').textContent = `Speed: ${Math.floor(currentSpeed * 3.6)} km/h`; // convert m/s to km/h

        // 2. Steering (Only steer if moving)
        if (currentSpeed > 0) {
            if (keys.a || keys.ArrowLeft || (touchX !== null && touchX < window.innerWidth / 2)) {
                playerCar.position.x -= steerSpeed * (currentSpeed/maxSpeed + 0.2);
            }
            if (keys.d || keys.ArrowRight || (touchX !== null && touchX > window.innerWidth / 2)) {
                playerCar.position.x += steerSpeed * (currentSpeed/maxSpeed + 0.2);
            }
            // Clamp to road limits
            playerCar.position.x = Math.max(-4.5, Math.min(4.5, playerCar.position.x));
            
            // Banking visual effect
            playerCar.rotation.z = -playerCar.position.x * 0.05;
        }

        // 3. Move Environment (Illusion of speed)
        // We move the buildings towards the camera
        buildings.children.forEach(b => {
            b.position.z += currentSpeed * 0.016; // delta time approx
            if (b.position.z > camera.position.z + 10) {
                b.position.z -= 300; // Send back to horizon
            }
        });

        // 4. Update Traffic & Collision
        // Reset lane trackers for next spawn cycle
        laneZTracker = [0, 0, 0]; 

        for (let i = trafficCars.length - 1; i >= 0; i--) {
            let aiCar = trafficCars[i];
            
            // Relative speed: AI moves down Z, minus player's speed pulling them towards camera
            let relativeSpeed = (currentSpeed - aiCar.userData.speed) * 0.016;
            aiCar.position.z += relativeSpeed;

            // Update lane tracker for spawning logic
            let laneIdx = lanes.indexOf(aiCar.position.x);
            if (laneIdx !== -1 && aiCar.position.z < laneZTracker[laneIdx]) {
                laneZTracker[laneIdx] = aiCar.position.z;
            }

            // Simple Box Collision Detection
            let zDist = Math.abs(playerCar.position.z - aiCar.position.z);
            let xDist = Math.abs(playerCar.position.x - aiCar.position.x);

            if (zDist < 2.5 && xDist < 1.5) {
                gameOver();
            }

            // Remove cars that passed behind the camera
            if (aiCar.position.z > camera.position.z + 10) {
                scene.remove(aiCar);
                trafficCars.splice(i, 1);
            }
        }

        // 5. Spawn new traffic randomly
        if (Math.random() < 0.03 && trafficCars.length < 8) {
            spawnTraffic();
        }

        // 6. Camera Shake effect at high speeds
        if (currentSpeed > maxSpeed * 0.8) {
            camera.position.x = (Math.random() - 0.5) * 0.05;
            camera.position.y = 3 + (Math.random() - 0.5) * 0.05;
        } else {
            camera.position.x = 0;
            camera.position.y = 3;
        }

        renderer.render(scene, camera);
    }

    function gameOver() {
        isGameOver = true;
        document.getElementById('finalScore').textContent = `Distance: ${Math.floor(distance)}m`;
        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    function resetGame() {
        isGameOver = false;
        distance = 0;
        currentSpeed = 0;
        playerCar.position.set(0, 0, 0);
        playerCar.rotation.z = 0;

        // Clear old traffic
        trafficCars.forEach(car => scene.remove(car));
        trafficCars = [];
        laneZTracker = [0, 0, 0];

        document.getElementById('gameOverScreen').style.display = 'none';
        
        spawnTraffic();
        animate();
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
